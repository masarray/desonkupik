name: Deploy Landing Page
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['docs/**', 'build/icon.png', '.github/workflows/pages.yml']
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Copy brand icon
        run: mkdir -p docs/assets && cp build/icon.png docs/assets/icon.png
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v5
