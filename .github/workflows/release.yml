name: Build Desktop Releases

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            command: npm run build && npx electron-builder --win nsis portable --x64 --publish never
            artifact: desonkupik-windows
            files: |
              release/*.exe
              release/*.blockmap
              release/*.yml
          - name: macOS x64
            os: macos-latest
            command: npm run build && npx electron-builder --mac dmg pkg --x64 --publish never
            artifact: desonkupik-macos-x64
            files: |
              release/*.dmg
              release/*.pkg
              release/*.zip
              release/*.blockmap
              release/*.yml
          - name: macOS arm64
            os: macos-latest
            command: npm run build && npx electron-builder --mac dmg pkg --arm64 --publish never
            artifact: desonkupik-macos-arm64
            files: |
              release/*.dmg
              release/*.pkg
              release/*.zip
              release/*.blockmap
              release/*.yml
          - name: Linux
            os: ubuntu-latest
            command: npm run build && npx electron-builder --linux AppImage deb tar.gz --x64 --publish never
            artifact: desonkupik-linux
            files: |
              release/*.AppImage
              release/*.deb
              release/*.tar.gz
              release/*.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools rpm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build desktop package
        run: ${{ matrix.command }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Show artifacts
        run: find release-artifacts -maxdepth 2 -type f -print

      - name: Generate SHA256 checksums
        run: |
          cd release-artifacts
          find . -type f ! -name 'SHA256SUMS.txt' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: release-artifacts/**/*
