version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-tooling:
        patterns:
          - '@types/*'
          - eslint*
          - prettier
          - typescript*
          - vite
      electron:
        patterns:
          - electron
          - electron-builder
      ui-runtime:
        patterns:
          - react
          - react-dom
          - '@radix-ui/*'
          - lucide-react
          - zustand
          - tailwind*
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
