name: Feature request
description: Suggest an improvement for DeSonKuPik
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What should be improved?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or UX change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Audio engine
        - Desktop app
        - Export
        - Presets
        - UI/UX
        - Documentation
        - Other
